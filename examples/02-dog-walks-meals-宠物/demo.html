<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buddy's Walks & Meals Tracker</title>
<style>
  :root {
    --gold: #d99a3f;
    --gold-dark: #b57a2a;
    --cream: #fdf6ec;
    --card: #ffffff;
    --ink: #4a3a28;
    --muted: #8a7a63;
    --green: #4a8f5c;
    --amber: #c96f2a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--cream);
    color: var(--ink);
    padding-bottom: 40px;
  }
  header {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #fff;
    padding: 22px 18px 26px;
    text-align: center;
    border-bottom-left-radius: 22px;
    border-bottom-right-radius: 22px;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 1.5rem;
  }
  header p {
    margin: 0;
    font-size: 0.95rem;
    opacity: 0.95;
  }
  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 16px;
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 18px;
    box-shadow: 0 2px 10px rgba(150, 110, 50, 0.12);
  }
  .card h2 {
    margin: 0 0 12px;
    font-size: 1.15rem;
    color: var(--gold-dark);
  }
  .reminder-banner {
    background: #fff1de;
    border: 1px solid var(--amber);
    color: var(--amber);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 0.95rem;
    font-weight: 600;
  }
  .user-toggle-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    font-size: 0.9rem;
    color: var(--muted);
  }
  .user-toggle-group {
    display: inline-flex;
    background: #f1e6d2;
    border-radius: 999px;
    padding: 3px;
  }
  .user-toggle {
    border: none;
    background: transparent;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--ink);
    font-weight: 600;
  }
  .user-toggle.active {
    background: var(--gold);
    color: #fff;
  }
  .slot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 10px;
    border-radius: 12px;
    background: #faf3e6;
    margin-bottom: 10px;
  }
  .slot:last-child { margin-bottom: 0; }
  .slot-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .slot-icon { font-size: 1.5rem; }
  .slot-label { font-weight: 700; font-size: 0.98rem; }
  .slot-time { color: var(--muted); font-size: 0.82rem; }
  .log-btn {
    background: var(--gold);
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .log-btn:active { background: var(--gold-dark); }
  .status-done {
    color: var(--green);
    font-size: 0.85rem;
    font-weight: 700;
    text-align: right;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  th, td {
    text-align: center;
    padding: 8px 4px;
  }
  th {
    color: var(--muted);
    font-weight: 700;
    font-size: 0.78rem;
    text-transform: uppercase;
  }
  tbody tr {
    border-top: 1px solid #f1e6d2;
  }
  tbody tr.today-row {
    background: #fff1de;
    font-weight: 700;
  }
  .day-cell {
    text-align: left;
    display: flex;
    flex-direction: column;
  }
  .today-tag {
    display: inline-block;
    background: var(--gold);
    color: #fff;
    font-size: 0.68rem;
    padding: 1px 7px;
    border-radius: 999px;
    margin-top: 2px;
    width: fit-content;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 10px 16px;
  }
</style>
</head>
<body>

<header>
  <h1>🐕 Buddy's Walks & Meals</h1>
  <p>Golden Retriever • Shared log with your partner</p>
</header>

<main>
  <div id="reminderBanner"></div>

  <div class="card">
    <h2>Today at a Glance</h2>
    <div class="user-toggle-wrap">
      <span>Logging as:</span>
      <div class="user-toggle-group" id="userToggleGroup">
        <button type="button" class="user-toggle" data-user="You">You</button>
        <button type="button" class="user-toggle" data-user="Partner">Partner</button>
      </div>
    </div>
    <div id="todaySlots"></div>
  </div>

  <div class="card">
    <h2>Weekly Summary</h2>
    <table>
      <thead>
        <tr>
          <th style="text-align:left;">Day</th>
          <th>Walks</th>
          <th>Meals</th>
        </tr>
      </thead>
      <tbody id="weeklyBody"></tbody>
    </table>
  </div>
</main>

<footer>Buddy says thanks for keeping track 🐾</footer>

<script>
(function () {
  var STORAGE_KEY = 'demofactory:dog-walk-meal-tracker:v1';

  var SLOTS = [
    { id: 'walk-am', type: 'walk', label: 'Morning Walk', time: '08:00', icon: '🐾' },
    { id: 'meal-am', type: 'meal', label: 'Morning Meal', time: '08:15', icon: '🍽️' },
    { id: 'walk-pm', type: 'walk', label: 'Evening Walk', time: '17:00', icon: '🐾' },
    { id: 'meal-pm', type: 'meal', label: 'Evening Meal', time: '17:15', icon: '🍽️' }
  ];

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function dateKeyOffset(offsetDays) {
    var d = new Date();
    d.setDate(d.getDate() - offsetDays);
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  }

  function todayKey() { return dateKeyOffset(0); }

  function currentTimeStr() {
    var d = new Date();
    return pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  var WEEKDAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  var MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  function humanDate(offsetDays) {
    var d = new Date();
    d.setDate(d.getDate() - offsetDays);
    return WEEKDAY_NAMES[d.getDay()] + ', ' + MONTH_NAMES[d.getMonth()] + ' ' + d.getDate();
  }

  function getDefaultData() {
    var days = {};
    days[dateKeyOffset(2)] = {
      'walk-am': { by: 'You', at: '08:02' },
      'meal-am': { by: 'Partner', at: '08:18' },
      'walk-pm': { by: 'You', at: '17:05' },
      'meal-pm': { by: 'Partner', at: '17:22' }
    };
    days[dateKeyOffset(1)] = {
      'walk-am': { by: 'Partner', at: '08:10' },
      'meal-am': { by: 'You', at: '08:20' },
      'walk-pm': { by: 'You', at: '17:12' },
      'meal-pm': { by: 'Partner', at: '17:30' }
    };
    days[dateKeyOffset(0)] = {
      'walk-am': { by: 'You', at: '08:05' },
      'meal-am': { by: 'Partner', at: '08:22' },
      'walk-pm': null,
      'meal-pm': null
    };
    return { currentUser: 'You', days: days };
  }

  function loadData() {
    var raw = null;
    try {
      raw = localStorage.getItem(STORAGE_KEY);
    } catch (e) {
      raw = null;
    }
    if (!raw) return getDefaultData();
    var parsed = null;
    try {
      parsed = JSON.parse(raw);
    } catch (e) {
      return getDefaultData();
    }
    if (!parsed || typeof parsed !== 'object') return getDefaultData();
    if (typeof parsed.currentUser !== 'string') parsed.currentUser = 'You';
    if (!parsed.days || typeof parsed.days !== 'object') parsed.days = {};
    return parsed;
  }

  function saveData(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
      /* ignore storage failures */
    }
  }

  var data = loadData();

  function ensureDay(dateKey) {
    if (!data.days[dateKey] || typeof data.days[dateKey] !== 'object') {
      data.days[dateKey] = {};
    }
    return data.days[dateKey];
  }

  function logSlot(slotId) {
    var day = ensureDay(todayKey());
    day[slotId] = { by: data.currentUser || 'You', at: currentTimeStr() };
    saveData(data);
    render();
  }

  function setCurrentUser(user) {
    data.currentUser = user;
    saveData(data);
    render();
  }

  function renderUserToggle() {
    var group = document.getElementById('userToggleGroup');
    if (!group) return;
    var btns = group.querySelectorAll('.user-toggle');
    for (var i = 0; i < btns.length; i++) {
      var btn = btns[i];
      if (btn.getAttribute('data-user') === (data.currentUser || 'You')) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    }
  }

  function renderReminder() {
    var banner = document.getElementById('reminderBanner');
    if (!banner) return;
    var day = data.days[todayKey()] || {};
    var now = currentTimeStr();
    var overdue = [];
    for (var i = 0; i < SLOTS.length; i++) {
      var slot = SLOTS[i];
      var entry = day[slot.id];
      if (!entry && now >= slot.time) {
        overdue.push(slot.label);
      }
    }
    if (overdue.length === 0) {
      banner.innerHTML = '';
      return;
    }
    banner.innerHTML = '<div class="reminder-banner">🐾 Gentle reminder: ' +
      overdue.join(' & ') + (overdue.length > 1 ? ' are' : ' is') + ' still waiting to be logged today.</div>';
  }

  function renderTodaySlots() {
    var container = document.getElementById('todaySlots');
    if (!container) return;
    var key = todayKey();
    var day = data.days[key] || {};
    var html = '';
    for (var i = 0; i < SLOTS.length; i++) {
      var slot = SLOTS[i];
      var entry = day[slot.id];
      html += '<div class="slot">';
      html += '<div class="slot-info"><span class="slot-icon">' + slot.icon + '</span>';
      html += '<div><div class="slot-label">' + slot.label + '</div>';
      html += '<div class="slot-time">Scheduled ' + slot.time + '</div></div></div>';
      if (entry && entry.by) {
        html += '<div class="status-done">✅ Logged by ' + entry.by + '<br>at ' + (entry.at || '') + '</div>';
      } else {
        html += '<button type="button" class="log-btn" data-slot="' + slot.id + '">Tap to Log</button>';
      }
      html += '</div>';
    }
    container.innerHTML = html;

    var buttons = container.querySelectorAll('.log-btn');
    for (var j = 0; j < buttons.length; j++) {
      buttons[j].addEventListener('click', function () {
        var slotId = this.getAttribute('data-slot');
        if (slotId) logSlot(slotId);
      });
    }
  }

  function renderWeekly() {
    var body = document.getElementById('weeklyBody');
    if (!body) return;
    var html = '';
    var todayK = todayKey();
    for (var offset = 6; offset >= 0; offset--) {
      var key = dateKeyOffset(offset);
      var day = data.days[key] || {};
      var walks = 0, meals = 0;
      if (day['walk-am']) walks++;
      if (day['walk-pm']) walks++;
      if (day['meal-am']) meals++;
      if (day['meal-pm']) meals++;
      var isToday = key === todayK;
      html += '<tr class="' + (isToday ? 'today-row' : '') + '">';
      html += '<td class="day-cell">' + humanDate(offset) +
        (isToday ? '<span class="today-tag">Today</span>' : '') + '</td>';
      html += '<td>' + walks + '/2</td>';
      html += '<td>' + meals + '/2</td>';
      html += '</tr>';
    }
    body.innerHTML = html;
  }

  function render() {
    renderReminder();
    renderUserToggle();
    renderTodaySlots();
    renderWeekly();
  }

  var toggleGroup = document.getElementById('userToggleGroup');
  if (toggleGroup) {
    var toggleBtns = toggleGroup.querySelectorAll('.user-toggle');
    for (var k = 0; k < toggleBtns.length; k++) {
      toggleBtns[k].addEventListener('click', function () {
        var user = this.getAttribute('data-user');
        if (user) setCurrentUser(user);
      });
    }
  }

  saveData(data);
  render();
})();
</script>

</body>
</html>
